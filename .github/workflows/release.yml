name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: just-talk-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: just-talk-aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: just-talk-x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: just-talk-x86_64-pc-windows-msvc
            ext: .exe
            extra_features: local-whisper

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libxtst-dev \
            libxdo-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install cmake + LLVM (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake llvm -y --no-progress
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build release binary
        if: "!matrix.extra_features"
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build release binary (with extra features)
        if: matrix.extra_features
        run: cargo build --locked --release --target ${{ matrix.target }} --features ${{ matrix.extra_features }}

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/just-talk ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item "target\${{ matrix.target }}\release\just-talk.exe" "${{ matrix.artifact }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext || '' }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find artifacts/ -type f -exec mv {} release-assets/ \;
          ls -la release-assets/

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Extract section between this tag and the previous one from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[$TAG\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.txt
          else
            echo "Release $TAG" > release_notes.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: just-talk ${{ steps.changelog.outputs.tag }}
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(steps.changelog.outputs.tag, '-') }}
          files: release-assets/*
